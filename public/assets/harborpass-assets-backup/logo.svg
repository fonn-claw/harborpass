<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Anchor icon mark -->
  <g stroke="#0F2B46" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical shaft -->
    <line x1="20" y1="8" x2="20" y2="38"/>
    <!-- Ring at top -->
    <circle cx="20" cy="8" r="4"/>
    <!-- Crossbar -->
    <line x1="12" y1="20" x2="28" y2="20"/>
    <!-- Flukes (curved arms at bottom) -->
    <path d="M10 32 Q10 38 20 38"/>
    <path d="M30 32 Q30 38 20 38"/>
  </g>
  <!-- Text: HarborPass -->
  <text x="44" y="22" font-family="DM Sans, sans-serif" font-weight="700" font-size="18" fill="#0F2B46">Harbor</text>
  <text x="44" y="40" font-family="DM Sans, sans-serif" font-weight="600" font-size="18" fill="#1B6FA8">Pass</text>
</svg>
